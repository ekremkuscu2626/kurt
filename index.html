<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kurt Operasyonu - YIKICI KURT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; 
              font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 8px #000; }
        #yukleme { position: absolute; width: 100%; height: 100%; background: #222; 
                   display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
    </style>
</head>
<body>
    <div id="yukleme">
        <h1 id="durum-metni">YIKICI KURT HAZIR...</h1>
        <p>Kutuları ezmek için ilerle!</p>
    </div>
    <div id="ui">EZİLEN KUTU: <span id="score">0</span></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, mixer;
        let clock = new THREE.Clock();
        let targetX = 0, enemies = [], gates = [];
        let score = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 60, 300);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 30, 60);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(40, 80, 40);
            sun.castShadow = true;
            scene.add(sun);

            // Yol
            let road = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 40000), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            road.position.y = -0.5;
            road.receiveShadow = true;
            scene.add(road);

            const loader = new THREE.GLTFLoader();
            const modelDosyalari = ['wolf.gltb', 'wolf.glb', 'wolf.gltf'];

            function modelYukle(index) {
                if (index >= modelDosyalari.length) {
                    yedekKarakterOlustur();
                    return;
                }

                loader.load(modelDosyalari[index], (gltf) => {
                    player = gltf.scene;
                    player.scale.set(10.8, 10.8, 10.8); 
                    player.rotation.y = Math.PI; 
                    player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                    scene.add(player);

                    if (gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(player);
                        mixer.clipAction(gltf.animations[0]).play();
                    }
                    document.getElementById('yukleme').style.display = 'none';
                }, undefined, (err) => {
                    modelYukle(index + 1);
                });
            }

            function yedekKarakterOlustur() {
                player = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 20), new THREE.MeshStandardMaterial({ color: 0x0000ff }));
                scene.add(player);
                document.getElementById('yukleme').style.display = 'none';
            }

            modelYukle(0);

            // Daha fazla kutu (Düşman) ekledik
            for(let i=1; i<100; i++) {
                createGate(Math.random() > 0.5 ? 10 : -10, -i * 120, 1);
                createEnemy(Math.random() * 20 - 10, -i * 50 - 30);
            }

            window.addEventListener('pointermove', (e) => {
                if (e.buttons === 1 || e.pointerType === 'touch') {
                    targetX += e.movementX * 0.12;
                    targetX = Math.max(-15, Math.min(15, targetX));
                }
            });

            animate();
        }

        function createGate(x, z) {
            let gate = new THREE.Mesh(new THREE.BoxGeometry(15, 20, 0.5), new THREE.MeshStandardMaterial({ color: 0x0088ff, transparent: true, opacity: 0.5 }));
            gate.position.set(x, 10, z);
            scene.add(gate);
            gates.push(gate);
        }

        function createEnemy(x, z) {
            let enemy = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff4400 }));
            enemy.position.set(x, 3, z);
            scene.add(enemy);
            enemies.push(enemy);
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();

            if (player) {
                player.position.z -= 0.7; // Biraz daha hızlandı
                player.position.x += (targetX - player.position.x) * 0.1;
                
                camera.position.set(player.position.x * 0.4, 35, player.position.z + 70);
                camera.lookAt(player.position.x, 6, player.position.z - 20);

                // --- ÇARPIŞMA VE KIRILMA MANTIĞI ---
                
                // Kapılara çarpma
                gates.forEach((g, i) => {
                    if(player.position.distanceTo(g.position) < 11.0) {
                        scene.remove(g);
                        gates.splice(i, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                    }
                });

                // Kutulara (Düşmanlara) çarpma ve kırma
                enemies.forEach((e, i) => {
                    if(player.position.distanceTo(e.position) < 9.0) {
                        // Burada "kırılma" efekti için kutuyu siliyoruz
                        scene.remove(e);
                        enemies.splice(i, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        
                        // İstersen buraya bir ekran sarsıntısı ekleyebiliriz!
                    }
                });
            }

            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
