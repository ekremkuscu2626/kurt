<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kurt Operasyonu - Dev Kurt</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; 
              font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 8px #000; }
        #yukleme { position: absolute; width: 100%; height: 100%; background: #222; 
                   display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
    </style>
</head>
<body>
    <div id="yukleme">
        <h1 id="durum-metni">KURT YÜKLENİYOR...</h1>
        <p>Lütfen bekleyin, model dosyaları taranıyor.</p>
    </div>
    <div id="ui">GÜÇ: <span id="power">1</span></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, mixer;
        let clock = new THREE.Clock();
        let targetX = 0, bullets = [], enemies = [], gates = [];
        let bulletPower = 1;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 20, 150); // Görüş mesafesi biraz artırıldı

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 8, 15); // Kamera başlangıcı biraz daha yukarı ve geri çekildi

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(10, 20, 10);
            sun.castShadow = true;
            scene.add(sun);

            let road = new THREE.Mesh(new THREE.BoxGeometry(16, 1, 10000), new THREE.MeshStandardMaterial({ color: 0x444444 }));
            road.position.y = -0.5;
            road.receiveShadow = true;
            scene.add(road);

            const loader = new THREE.GLTFLoader();
            const modelDosyalari = ['wolf.glb', 'Wolf-Blender-2.8 2a.glb', 'wolf.gltf', 'Wolf-Blender-2.8 2a.gltf'];

            function modelYukle(index) {
                if (index >= modelDosyalari.length) {
                    yedekKarakterOlustur();
                    return;
                }

                loader.load(modelDosyalari[index], (gltf) => {
                    player = gltf.scene;
                    // BOYUT %50 ARTIRILDI: 1.8 -> 2.7
                    player.scale.set(2.7, 2.7, 2.7); 
                    player.rotation.y = Math.PI; 
                    player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                    scene.add(player);

                    if (gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(player);
                        mixer.clipAction(gltf.animations[0]).play();
                    }
                    document.getElementById('yukleme').style.display = 'none';
                }, undefined, (err) => {
                    modelYukle(index + 1);
                });
            }

            function yedekKarakterOlustur() {
                player = new THREE.Mesh(new THREE.BoxGeometry(2.2, 2.2, 4.5), new THREE.MeshStandardMaterial({ color: 0x0000ff }));
                scene.add(player);
                document.getElementById('yukleme').style.display = 'none';
            }

            modelYukle(0);

            for(let i=1; i<50; i++) {
                createGate(Math.random() > 0.5 ? 4 : -4, -i * 60, Math.floor(Math.random()*10)+1);
                createEnemy(Math.random() * 10 - 5, -i * 40 - 20);
            }

            window.addEventListener('pointermove', (e) => {
                if (e.buttons === 1 || e.pointerType === 'touch') {
                    targetX += e.movementX * 0.05;
                    targetX = Math.max(-7, Math.min(7, targetX));
                }
            });

            setInterval(shoot, 400); 
            animate();
        }

        function createGate(x, z, val) {
            let gate = new THREE.Group();
            let color = val > 5 ? 0x00ff00 : 0x0088ff;
            let mesh = new THREE.Mesh(new THREE.BoxGeometry(6, 8, 0.2), new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.5 }));
            gate.add(mesh);
            gate.position.set(x, 4, z);
            gate.userData = { value: val };
            scene.add(gate);
            gates.push(gate);
        }

        function createEnemy(x, z) {
            let enemy = new THREE.Mesh(new THREE.BoxGeometry(3, 3, 3), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            enemy.position.set(x, 1.5, z);
            enemy.userData = { health: 3 };
            scene.add(enemy);
            enemies.push(enemy);
        }

        function shoot() {
            if (!player) return;
            let bullet = new THREE.Mesh(new THREE.SphereGeometry(0.3, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            // Mermi çıkış yüksekliği karakter büyümesine göre ayarlandı (1.5 -> 2.2)
            bullet.position.set(player.position.x, 2.2, player.position.z - 3);
            scene.add(bullet);
            bullets.push(bullet);
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();

            if (player) {
                player.position.z -= 0.3; 
                player.position.x += (targetX - player.position.x) * 0.1;
                
                // Kamera takibi dev kurt için uyarlandı
                camera.position.set(player.position.x * 0.5, player.position.y + 9, player.position.z + 18);
                camera.lookAt(player.position.x, 2, player.position.z - 5);

                gates.forEach((g, i) => {
                    // Çarpışma mesafesi büyütüldü (2.5 -> 3.5)
                    if(player.position.distanceTo(g.position) < 3.5) {
                        bulletPower += g.userData.value;
                        document.getElementById('power').innerText = bulletPower;
                        scene.remove(g);
                        gates.splice(i, 1);
                    }
                });
            }

            bullets.forEach((b, bi) => {
                b.position.z -= 1.2;
                enemies.forEach((e, ei) => {
                    if(b.position.distanceTo(e.position) < 2.5) {
                        e.userData.health--;
                        scene.remove(b);
                        bullets.splice(bi, 1);
                        if(e.userData.health <= 0) {
                            scene.remove(e);
                            enemies.splice(ei, 1);
                        }
                    }
                });
            });

            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
