<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kurt - Kesin Hitbox Çözümü</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; 
              font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 8px #000; }
        #yukleme { position: absolute; width: 100%; height: 100%; background: #222; 
                   display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
    </style>
</head>
<body>
    <div id="yukleme"><h1>HITBOX AYARLANIYOR...</h1></div>
    <div id="ui">YIKILAN: <span id="score">0</span></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, mixer;
        let clock = new THREE.Clock();
        let targetX = 0, enemies = [], particles = [];
        let score = 0, shakeIntensity = 0;
        
        // --- HITBOX İÇİN KESİN DEĞİŞKENLER ---
        let playerHitboxBox3 = new THREE.Box3();
        let hitboxHelperMesh; 

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(40, 80, 40);
            scene.add(sun);

            let road = new THREE.Mesh(new THREE.BoxGeometry(80, 1, 40000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
            road.position.y = -0.5;
            scene.add(road);

            // --- HITBOX GÖRSELİNİ ÖNCEDEN OLUŞTUR ---
            // Genişlik: 8, Yükseklik: 10, Derinlik: 18 (Dev kurda uygun boyut)
            let hitGeo = new THREE.BoxGeometry(8, 10, 18); 
            let hitMat = new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true });
            hitboxHelperMesh = new THREE.Mesh(hitGeo, hitMat);
            scene.add(hitboxHelperMesh); 

            const loader = new THREE.GLTFLoader();
            loader.load('wolf.glb', (gltf) => {
                player = gltf.scene;
                player.scale.set(10.8, 10.8, 10.8); 
                player.rotation.y = Math.PI; 
                scene.add(player);

                if (gltf.animations.length > 0) {
                    mixer = new THREE.AnimationMixer(player);
                    mixer.clipAction(gltf.animations[0]).play();
                }
                document.getElementById('yukleme').style.display = 'none';
            }, undefined, () => yedekKarakterOlustur());

            for(let i=1; i<150; i++) createEnemy(Math.random() * 50 - 25, -i * 70 - 50);

            window.addEventListener('pointermove', (e) => {
                if (e.buttons === 1 || e.pointerType === 'touch') {
                    targetX += e.movementX * 0.15;
                    targetX = Math.max(-30, Math.min(30, targetX));
                }
            });

            animate();
        }

        function createEnemy(x, z) {
            let enemy = new THREE.Mesh(
                new THREE.BoxGeometry(10, 10, 10), 
                new THREE.MeshStandardMaterial({ color: 0xff4400 })
            );
            enemy.position.set(x, 5, z);
            enemy.userData.hitbox = new THREE.Box3(); 
            scene.add(enemy);
            enemies.push(enemy);
        }

        function explode(x, y, z, color) {
            for(let i=0; i<10; i++) {
                let p = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshBasicMaterial({ color: color }));
                p.position.set(x, y, z);
                p.userData = { vx: (Math.random()-0.5)*3, vy: Math.random()*3, vz: (Math.random()-0.5)*3, life: 1.0 };
                scene.add(p);
                particles.push(p);
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();

            if (player) {
                player.position.z -= 0.8; 
                player.position.x += (targetX - player.position.x) * 0.1;
                
                // --- HITBOX'I KURDUN ÜSTÜNE SABİTLE ---
                if(hitboxHelperMesh) {
                    hitboxHelperMesh.position.set(player.position.x, player.position.y + 5, player.position.z);
                    playerHitboxBox3.setFromObject(hitboxHelperMesh); // Çarpışmayı bu kutu üzerinden hesapla
                }

                camera.position.set(player.position.x * 0.4 + (Math.random()-0.5)*shakeIntensity, 45, player.position.z + 90);
                camera.lookAt(player.position.x, 5, player.position.z - 20);
                if(shakeIntensity > 0) shakeIntensity *= 0.9;

                // --- ÇARPIŞMA KONTROLÜ ---
                enemies.forEach((e, i) => {
                    e.userData.hitbox.setFromObject(e);
                    if(playerHitboxBox3.intersectsBox(e.userData.hitbox)) {
                        explode(e.position.x, e.position.y, e.position.z, e.material.color);
                        scene.remove(e);
                        enemies.splice(i, 1);
                        score++;
                        document.getElementById('score').innerText = score;
                        shakeIntensity = 2.5; 
                    }
                });
            }

            particles.forEach((p, i) => {
                p.position.x += p.userData.vx; p.position.y += p.userData.vy; p.position.z += p.userData.vz;
                p.userData.vy -= 0.08; p.userData.life -= 0.02;
                p.scale.setScalar(p.userData.life);
                if(p.userData.life <= 0) { scene.remove(p); particles.splice(i, 1); }
            });

            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }

        function yedekKarakterOlustur() {
            player = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 20), new THREE.MeshStandardMaterial({ color: 0x0000ff }));
            scene.add(player);
            document.getElementById('yukleme').style.display = 'none';
        }

        init();
    </script>
</body>
</html>
