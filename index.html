<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Kurt Operasyonu - MEGA DEV KURT</title>
    <style>
        body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; }
        #ui { position: absolute; top: 20px; width: 100%; text-align: center; color: white; 
              font-size: 32px; font-weight: bold; pointer-events: none; text-shadow: 2px 2px 8px #000; }
        #yukleme { position: absolute; width: 100%; height: 100%; background: #222; 
                   display: flex; flex-direction: column; justify-content: center; align-items: center; color: white; z-index: 100; }
    </style>
</head>
<body>
    <div id="yukleme">
        <h1 id="durum-metni">MEGA DEV KURT UYANIYOR...</h1>
        <p>Boyut: 2 Katına Çıkarıldı (Ölçek: 10.8)</p>
    </div>
    <div id="ui">GÜÇ: <span id="power">1</span></div>

    <script src="https://unpkg.com/three@0.128.0/build/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

    <script>
        let scene, camera, renderer, player, mixer;
        let clock = new THREE.Clock();
        let targetX = 0, bullets = [], enemies = [], gates = [];
        let bulletPower = 1;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 60, 300); // Sis mesafesi mega boyuta göre artırıldı

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 5000);
            camera.position.set(0, 30, 60); // Kamera devasa kurt için çok daha geriye alındı

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            let sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(40, 80, 40);
            sun.castShadow = true;
            scene.add(sun);

            // Yol mega boyuta göre genişletildi
            let road = new THREE.Mesh(new THREE.BoxGeometry(40, 1, 40000), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            road.position.y = -0.5;
            road.receiveShadow = true;
            scene.add(road);

            const loader = new THREE.GLTFLoader();
            const modelDosyalari = ['wolf.gltb', 'wolf.glb', 'wolf.gltf'];

            function modelYukle(index) {
                if (index >= modelDosyalari.length) {
                    yedekKarakterOlustur();
                    return;
                }

                loader.load(modelDosyalari[index], (gltf) => {
                    player = gltf.scene;
                    // BOYUT TEKRAR 2 KATINA ÇIKARILDI: 5.4 -> 10.8
                    player.scale.set(10.8, 10.8, 10.8); 
                    player.rotation.y = Math.PI; 
                    player.traverse(n => { if(n.isMesh) n.castShadow = true; });
                    scene.add(player);

                    if (gltf.animations.length > 0) {
                        mixer = new THREE.AnimationMixer(player);
                        mixer.clipAction(gltf.animations[0]).play();
                    }
                    document.getElementById('yukleme').style.display = 'none';
                }, undefined, (err) => {
                    modelYukle(index + 1);
                });
            }

            function yedekKarakterOlustur() {
                player = new THREE.Mesh(new THREE.BoxGeometry(10, 10, 20), new THREE.MeshStandardMaterial({ color: 0x0000ff }));
                scene.add(player);
                document.getElementById('yukleme').style.display = 'none';
            }

            modelYukle(0);

            for(let i=1; i<80; i++) {
                createGate(Math.random() > 0.5 ? 10 : -10, -i * 120, Math.floor(Math.random()*30)+10);
                createEnemy(Math.random() * 20 - 10, -i * 70 - 50);
            }

            window.addEventListener('pointermove', (e) => {
                if (e.buttons === 1 || e.pointerType === 'touch') {
                    targetX += e.movementX * 0.12;
                    targetX = Math.max(-15, Math.min(15, targetX));
                }
            });

            setInterval(shoot, 300); 
            animate();
        }

        function createGate(x, z, val) {
            let gate = new THREE.Group();
            let color = val > 15 ? 0x00ff00 : 0x0088ff;
            // Kapılar dev kurda göre devasa yapıldı
            let mesh = new THREE.Mesh(new THREE.BoxGeometry(15, 20, 0.5), new THREE.MeshStandardMaterial({ color: color, transparent: true, opacity: 0.5 }));
            gate.add(mesh);
            gate.position.set(x, 10, z);
            gate.userData = { value: val };
            scene.add(gate);
            gates.push(gate);
        }

        function createEnemy(x, z) {
            let enemy = new THREE.Mesh(new THREE.BoxGeometry(6, 6, 6), new THREE.MeshStandardMaterial({ color: 0xff0000 }));
            enemy.position.set(x, 3, z);
            enemy.userData = { health: 10 };
            scene.add(enemy);
            enemies.push(enemy);
        }

        function shoot() {
            if (!player) return;
            let bullet = new THREE.Mesh(new THREE.SphereGeometry(0.8, 8, 8), new THREE.MeshBasicMaterial({ color: 0xffff00 }));
            // Mermi çıkış yüksekliği MEGA ağız hizasına göre (9.0) ayarlandı
            bullet.position.set(player.position.x, 9.0, player.position.z - 12);
            scene.add(bullet);
            bullets.push(bullet);
        }

        function animate() {
            requestAnimationFrame(animate);
            let delta = clock.getDelta();

            if (player) {
                player.position.z -= 0.6; // Büyük cüsse için hız biraz artırıldı
                player.position.x += (targetX - player.position.x) * 0.1;
                
                // Kamera takibi (Mega boyuta uygun yüksekten ve geriden bakış)
                camera.position.set(player.position.x * 0.4, 35, player.position.z + 70);
                camera.lookAt(player.position.x, 6, player.position.z - 20);

                gates.forEach((g, i) => {
                    // Çarpışma alanı mega gövdeye göre uyarlandı (11.0)
                    if(player.position.distanceTo(g.position) < 11.0) {
                        bulletPower += g.userData.value;
                        document.getElementById('power').innerText = bulletPower;
                        scene.remove(g);
                        gates.splice(i, 1);
                    }
                });
            }

            bullets.forEach((b, bi) => {
                b.position.z -= 2.5;
                enemies.forEach((e, ei) => {
                    if(b.position.distanceTo(e.position) < 8.0) {
                        e.userData.health -= (bulletPower / 2);
                        scene.remove(b);
                        bullets.splice(bi, 1);
                        if(e.userData.health <= 0) {
                            scene.remove(e);
                            enemies.splice(ei, 1);
                        }
                    }
                });
            });

            if (mixer) mixer.update(delta);
            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        init();
    </script>
</body>
</html>
